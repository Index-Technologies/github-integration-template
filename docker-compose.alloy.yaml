x-alloy:
  frontend-port: 8080
  home-url: /
  install-script: |
    cd /app/api && npm install
    cd /app/site && npm install

services:
  api:
    image: node:20-slim
    network_mode: host
    working_dir: /app/api
    command: ["node", "--watch", "server.js"]
    volumes:
      - .:/app
    restart: unless-stopped

  site:
    image: node:20-slim
    network_mode: host
    working_dir: /app/site
    command: ["npx", "next", "dev", "--port", "8080", "--hostname", "0.0.0.0"]
    volumes:
      - .:/app
    depends_on:
      - api
    restart: unless-stopped
