x-alloy:
  frontend-port: 8080
  home-url: /

services:
  api:
    image: node:20.18-bookworm-slim
    network_mode: host
    working_dir: /workspace/api
    volumes:
      - .:/workspace
    command: sh -c "npm install --no-audit --no-fund && npm run dev"

  site:
    image: node:20.18-bookworm-slim
    network_mode: host
    working_dir: /workspace/site
    volumes:
      - .:/workspace
    command: sh -c "npm install --no-audit --no-fund && npm run dev"
    depends_on:
      - api
