services:
  api:
    image: node:22-bookworm
    working_dir: /workspace/api
    network_mode: host
    volumes:
      - .:/workspace
    command: bash -lc "npm install && npm run dev"
    restart: unless-stopped

  site:
    image: node:22-bookworm
    working_dir: /workspace/site
    network_mode: host
    volumes:
      - .:/workspace
    depends_on:
      - api
    command: bash -lc "npm install && npm run dev"
    restart: unless-stopped
