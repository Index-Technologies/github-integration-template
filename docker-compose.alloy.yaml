# Alloy sandbox compose file.
#
# Hard requirements honored:
#   - network_mode: host (frontend proxies to http://127.0.0.1:3001; must share
#     the host network namespace with the api service).
#   - No published `ports` mappings (host networking publishes implicitly).
#   - Everything runs under Docker — services are not executed natively.
#
# Services:
#   api   – Fastify + SQLite backend on 3001 (server.js + demo.db inside ./api)
#   site  – Next.js frontend on 8080 (proxies /api/* to 127.0.0.1:3001)
#
# Both services install their dependencies at container start so no prebuilt
# image layers are required.  Node modules are stored in named volumes to
# avoid polluting the host workspace and to keep subsequent boots fast.

services:
  api:
    image: node:22-bookworm
    working_dir: /app
    network_mode: host
    command: >
      bash -lc "npm install --no-audit --no-fund --loglevel=error &&
               npm run start"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    restart: unless-stopped

  site:
    image: node:22-bookworm
    working_dir: /app
    network_mode: host
    depends_on:
      - api
    environment:
      - NODE_ENV=development
      - HOSTNAME=0.0.0.0
      - PORT=8080
    command: >
      bash -lc "npm install --no-audit --no-fund --loglevel=error &&
               npm run dev"
    volumes:
      - ./site:/app
      - site_node_modules:/app/node_modules
      - site_next_cache:/app/.next
    restart: unless-stopped

volumes:
  api_node_modules:
  site_node_modules:
  site_next_cache:
