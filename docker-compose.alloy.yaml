x-alloy:
  install-script: |
    cd /workspace && npm install
    cd /workspace/api && npm install
    cd /workspace/site && npm install
  before-start-script: ""
  frontend-port: 8080
  home-url: /
  login-script: ""

services:
  api:
    image: node:22
    working_dir: /workspace/api
    volumes:
      - .:/workspace
    command: npm run dev
    ports:
      - "3001:3001"
    restart: unless-stopped

  site:
    image: node:22
    working_dir: /workspace/site
    volumes:
      - .:/workspace
    command: npm run dev
    ports:
      - "8080:8080"
    depends_on:
      - api
    restart: unless-stopped
