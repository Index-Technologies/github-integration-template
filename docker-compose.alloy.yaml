services:
  api:
    image: node:22-bookworm
    working_dir: /workspace/api
    network_mode: host
    volumes:
      - .:/workspace
    command: bash -lc "npm install && npm run dev"
    restart: unless-stopped

  site:
    image: node:22-bookworm
    working_dir: /workspace/site
    network_mode: host
    volumes:
      - .:/workspace
    depends_on:
      - api
    # Override the repo's default port (8080) because Alloy's preview proxy
    # already listens on 8080 and forwards to frontendPort.
    command: bash -lc "npm install && npx next dev --port 3000 --hostname 0.0.0.0"
    restart: unless-stopped
